################
### MONITORS ###
################
# Config específica por host — home.nix linka hosts/$HOST/hyprland-monitors.conf
source = ~/.config/hypr/monitors.conf

###################
### MY PROGRAMS ###
###################
$terminal    = kitty
$fileManager = nautilus --new-window
$mainMod     = SUPER

#################
### AUTOSTART ###
#################
exec-once = bash ~/.config/quickshell/scripts/quickshell-start.sh
exec-once = /run/current-system/sw/bin/awww-daemon
exec-once = hypridle
exec-once = bash -lc 'busctl --user --quiet status org.freedesktop.Notifications >/dev/null 2>&1 || systemctl --user start mako 2>/dev/null || exec mako --config ~/dotfiles/generated/mako/config'
exec-once = bash ~/.config/quickshell/scripts/init-border.sh

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = NIXOS_OZONE_WL, 1
env = QT_QPA_PLATFORM, wayland
env = GDK_BACKEND, wayland,x11
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in  = 3
    gaps_out = 0
    border_size = 0
    col.active_border   = rgba(00000000)
    col.inactive_border = rgba(00000000)
}

decoration {
    rounding = 12
}

layerrule = animation slide, match:namespace notifications

animations {
    enabled = true
    # Zephyr-inspired preset with a faster modern close path.
    bezier = strataZephyr, 0.23, 1,    0.61, 1
    bezier = strataClose,  0.33, 0,    0.12, 1
    bezier = strataFade,   0.28, 0,    0.18, 1
    bezier = strataBorder, 0.40, 0.90, 0.35, 1

    animation = global,            1, 7,  strataZephyr
    animation = border,            1, 7,  strataBorder
    animation = fade,              1, 5,  strataFade
    animation = windows,           1, 2,  strataZephyr, popin 92%
    animation = windowsIn,         1, 2,  strataZephyr, popin 92%
    animation = windowsOut,        1, 2,  strataClose,  popin 86%
    animation = windowsMove,       1, 6,  strataZephyr
    animation = layers,            1, 5,  strataZephyr, popin 96%
    animation = layersIn,          1, 5,  strataZephyr, popin 96%
    animation = layersOut,         1, 3,  strataClose,  fade
    animation = workspaces,        1, 6,  strataZephyr, slide
    animation = specialWorkspace,  1, 6,  strataZephyr, slide
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    background_color        = 0x111113
}

#############
### INPUT ###
#############
input {
    kb_layout  = br
    kb_model   = abnt2
    follow_mouse = 1
    mouse_refocus = false
    sensitivity  = 0
    touchpad {
        disable_while_typing = true
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

#####################
### KEYBINDINGS   ###
#####################

# Apps
bind = $mainMod,       Return,  exec, $terminal
bind = $mainMod,       F,       exec, $fileManager
bind = $mainMod,       W,       exec, bash ~/.config/quickshell/scripts/codex-close-guard.sh
bind = $mainMod,       P,       exit
bind = $mainMod SHIFT, V,       togglefloating
bind = $mainMod SHIFT, F,       fullscreen, 0
bind = $mainMod,       Space,   exec, quickshell ipc call launcher toggle
bind = $mainMod,       Escape,  exec, quickshell ipc call powermenu toggle
bind = $mainMod,       Q,       exec, quickshell ipc call themepicker toggle
bind = $mainMod,       A,       exec, quickshell ipc call wallPickr toggle
bind = $mainMod,       V,       exec, quickshell ipc call clipboard toggle
bind = $mainMod,       U,       exec, quickshell ipc call updatecenter toggle
bind = $mainMod,       S,       exec, quickshell ipc call settingscenter toggle
bind = CTRL $mainMod,  Space,   exec, bash ~/.config/quickshell/scripts/theme-switch.sh

# Screenshots
bind  = ,       Print, exec, bash ~/.config/quickshell/scripts/screenshot.sh area copysave
bind  = SHIFT,  Print, exec, bash ~/.config/quickshell/scripts/screenshot.sh screen copysave
bind  = CTRL,   Print, exec, bash ~/.config/quickshell/scripts/screenshot.sh active copysave
bind  = $mainMod SHIFT, S, exec, bash ~/.config/quickshell/scripts/screenshot.sh area copysave
bind  = $mainMod SHIFT, D, exec, bash ~/.config/quickshell/scripts/screenshot.sh screen copysave
bind  = $mainMod CTRL,  S, exec, bash ~/.config/quickshell/scripts/screenshot.sh area edit
bind  = $mainMod CTRL,  D, exec, bash ~/.config/quickshell/scripts/screenshot.sh screen edit

# Screen recording
bind  = ALT,    Print, exec, bash ~/.config/quickshell/scripts/screenrecord.sh
bind  = $mainMod ALT, R, exec, bash ~/.config/quickshell/scripts/screenrecord.sh

# Foco
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover janela para workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod,       G, togglespecialworkspace, magic
bind = $mainMod SHIFT, G, movetoworkspace,        special:magic

# Scroll entre workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Mover/redimensionar janelas
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume / brilho / media
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -n2 set 5%-
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindel = $mainMod, minus,         exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = $mainMod, equal,         exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = $mainMod, backslash,     exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = $mainMod SHIFT, minus,   exec, brightnessctl -n2 set 5%-
bindel = $mainMod SHIFT, equal,   exec, brightnessctl -n2 set 5%+
bindl  = $mainMod CTRL, Left,     exec, playerctl previous
bindl  = $mainMod CTRL, Down,     exec, playerctl play-pause
bindl  = $mainMod CTRL, Right,    exec, playerctl next

######################
### WINDOW RULES   ###
######################

# File picker
windowrule = float on,                              match:class xdg-desktop-portal-gtk
windowrule = size 1200 800,                         match:class xdg-desktop-portal-gtk
windowrule = move onscreen cursor -50% -50%,        match:class xdg-desktop-portal-gtk

# pwvucontrol
windowrule = float on,                              match:class com.saivert.pwvucontrol

# btop
windowrule = float on,                              match:title btop
windowrule = size 900 660,                          match:title btop
windowrule = move onscreen cursor -50% -50%,        match:title btop

# impala
windowrule = float on,                              match:title impala
windowrule = size 1100 650,                          match:title impala
windowrule = move onscreen cursor -50% -50%,        match:title impala

# bluetui
windowrule = float on,                              match:title bluetui
windowrule = size 1100 650,                          match:title bluetui
windowrule = move onscreen cursor -50% -50%,        match:title bluetui

# Loupe
windowrule = float on,                              match:class org.gnome.Loupe
windowrule = size 900 700,                          match:class org.gnome.Loupe
windowrule = move onscreen cursor -50% -50%,        match:class org.gnome.Loupe

# Zathura
windowrule = float on,                              match:class org.pwmt.zathura
windowrule = size 900 700,                          match:class org.pwmt.zathura
windowrule = move onscreen cursor -50% -50%,        match:class org.pwmt.zathura

# mpv
windowrule = float on,                              match:class mpv
windowrule = size 1280 720,                         match:class mpv
windowrule = move onscreen cursor -50% -50%,        match:class mpv

# Utility apps
windowrule = float on,                              match:class org.gnome.Calculator
windowrule = size 420 620,                          match:class org.gnome.Calculator
windowrule = move onscreen cursor -50% -50%,        match:class org.gnome.Calculator
windowrule = float on,                              match:class org.gnome.clocks
windowrule = size 760 620,                          match:class org.gnome.clocks
windowrule = move onscreen cursor -50% -50%,        match:class org.gnome.clocks
windowrule = float on,                              match:class org.gnome.Calendar
windowrule = size 1040 760,                         match:class org.gnome.Calendar
windowrule = move onscreen cursor -50% -50%,        match:class org.gnome.Calendar
windowrule = float on,                              match:class org.gnome.FileRoller
windowrule = size 980 720,                          match:class org.gnome.FileRoller
windowrule = move onscreen cursor -50% -50%,        match:class org.gnome.FileRoller
windowrule = float on,                              match:class io.github.seadve.Kooha
windowrule = size 900 700,                          match:class io.github.seadve.Kooha
windowrule = move onscreen cursor -50% -50%,        match:class io.github.seadve.Kooha
windowrule = float on,                              match:class org.gnome.SimpleScan
windowrule = size 980 760,                          match:class org.gnome.SimpleScan
windowrule = move onscreen cursor -50% -50%,        match:class org.gnome.SimpleScan
windowrule = float on,                              match:class org.gnome.Settings
windowrule = size 1180 800,                         match:class org.gnome.Settings
windowrule = move onscreen cursor -50% -50%,        match:class org.gnome.Settings

# Apps adicionais
bind = $mainMod, B, exec, chromium
bind = $mainMod, M, exec, spotify

device {
    name = elan0b00:00-04f3:30ea-mouse
    disable_while_typing = true
}

device {
    name = elan0b00:00-04f3:30ea-touchpad
    disable_while_typing = false
}

# App Manager
bind = $mainMod, I, exec, quickshell ipc call appcenter toggle
windowrule = float on,                       match:title app-manager
windowrule = size 400 260,                   match:title app-manager
windowrule = move onscreen cursor -50% -50%, match:title app-manager
windowrule = size 700 580, match:title app-manager-full
windowrule = float on,                       match:title app-search
windowrule = size 700 550,                   match:title app-search
windowrule = move onscreen cursor -50% -50%, match:title app-search
windowrule = float on,                       match:class strata-rebuild
windowrule = size 760 520,                   match:class strata-rebuild
windowrule = move onscreen cursor -50% -50%, match:class strata-rebuild
