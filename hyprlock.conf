general {
  disable_loading_bar = true
  hide_cursor         = true
}

background {
  monitor =
  path    = /home/ankh/dotfiles/wallpapers/gruvbox/Gruvbox1.png
  blur_passes  = 3
  blur_size    = 8
  brightness   = 0.6
}

# relógio pequeno
label {
  monitor =
  text    = cmd[update:1000] date '+%H:%M'
  color   = rgba(e0e0e0ee)
  font_size   = 64
  font_family = JetBrainsMono Nerd Font
  position    = 0, 120
  halign      = center
  valign      = center
}

# data
label {
  monitor =
  text    = cmd[update:60000] date '+%A, %d de %B'
  color   = rgba(d7992188)
  font_size   = 14
  font_family = JetBrainsMono Nerd Font
  position    = 0, 60
  halign      = center
  valign      = center
}

# campo de senha
input-field {
  monitor =
  size    = 280, 44
  outline_thickness = 1
  outer_color       = rgba(ffffff25)
  inner_color       = rgba(ffffff15)
  font_color        = rgba(ffffffe0)
  fade_on_empty     = false
  placeholder_text  = Password
      check_color       = rgba(d79921ff)
  fail_color        = rgba(ff6b6bff)
  fail_text         = Wrong password
  rounding          = 22
  position          = 0, -40
  halign            = center
  valign            = center
}
