include colors.conf
# ── Fonte ──────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        11.0

# ── Espaçamento ────────────────────────────────────────────────────────────
modify_font      cell_height 120%
letter_spacing   0.3

# ── Cursor ─────────────────────────────────────────────────────────────────
cursor_shape           beam
cursor_beam_thickness  1.5
cursor_blink_interval  0.5
cursor_stop_blinking_after 15.0

# ── Scroll ─────────────────────────────────────────────────────────────────
scrollback_lines 8000
wheel_scroll_multiplier 3.0

# ── Janela ─────────────────────────────────────────────────────────────────
window_padding_width    14 18
hide_window_decorations yes
confirm_os_window_close 0
remember_window_size    no
initial_window_width    900
initial_window_height   560

# ── Cores ───────────────────────────────────────────────────────────────────
foreground            #e0e0e0
selection_foreground  #0d0d0f
selection_background  #cf9fff

# Black
color0  #1a1a1e
color8  #3a3a3e
# Red
color1  #f28779
color9  #f28779
# Green
color2  #87c181
color10 #87c181
# Yellow
color3  #d9bc8c
color11 #d9bc8c
# Blue
color4  #7bafd4
color12 #7bafd4
# Magenta / Accent
color5  #cf9fff
color13 #d4b0ff
# Cyan
color6  #80c4c4
color14 #80c4c4
# White
color7  #cecece
color15 #f5f5f5

# ── URL ─────────────────────────────────────────────────────────────────────
url_color            #cf9fff
url_style            curly
open_url_with        default
detect_urls          yes

# ── Tab bar ─────────────────────────────────────────────────────────────────
tab_bar_style              powerline
tab_powerline_style        slanted
tab_bar_min_tabs           2
tab_bar_margin_width       4
tab_bar_margin_height      4 0
active_tab_foreground      #0d0d0f
active_tab_background      #cf9fff
active_tab_font_style      bold
inactive_tab_foreground    #888888
inactive_tab_background    #111113
inactive_tab_font_style    normal
tab_title_template         "  {title}  "

# ── Bell ─────────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0

# ── Misc ─────────────────────────────────────────────────────────────────────
strip_trailing_spaces smart
close_on_child_death  no
shell_integration     enabled
